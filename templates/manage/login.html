{% load static %}
<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>تسجيل الدخول — لوحة APS</title>
  <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
  <link rel="stylesheet" href="{% static 'css/manage.css' %}">
</head>
<body class="m-body">
  <div class="m-login">
    <form class="m-login__card" method="post" action="">
      {% csrf_token %}
      <img class="m-login__logo" src="{% static 'logos/aps-logo.png' %}" alt="APS">
      <div class="m-login__sub">لوحة إدارة محتوى الموقع</div>
      {% if error %}<div class="m-msg m-msg--error">{{ error }}</div>{% endif %}
      <div class="f-row">
        <label class="f-lbl" for="id_username">اسم المستخدم</label>
        <input class="f-in" id="id_username" name="username" autofocus required>
      </div>
      <div class="f-row">
        <label class="f-lbl" for="id_password">كلمة المرور</label>
        <input class="f-in" id="id_password" name="password" type="password" required>
      </div>
      <button class="btnm" type="submit" style="width:100%;justify-content:center;margin-top:8px">تسجيل الدخول</button>
      <div style="text-align:center;margin-top:16px">
        <a href="/manage/password-reset/" style="font-size:.85rem">نسيت كلمة المرور؟</a>
      </div>
    </form>
  </div>
</body>
</html>
